name: Deploy Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          CLQ_SKIP_VERSION_BUMP: "1"
        run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist --functions=netlify/functions --message "${{ github.event.head_commit.message }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
