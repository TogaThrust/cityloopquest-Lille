<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="selfie_title">Selfie souvenir</title>
    <link rel="stylesheet" href="style.css">
    <script src="translations/translationManager.js"></script>
    <script src="translations/languageSelector.js"></script>
<script src="js/clq-city-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
<!-- Garde d'accès : bloque l'accès si aucun code d'activation valide (clq_short_code) -->
<script src="js/access-guard.js" defer></script>



    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Empêche tout défilement */
            margin: 0;
            padding: 0;
        }
        header.main-header {
            flex-shrink: 0; /* L'en-tête ne se réduit pas */
        }
        .selfie-container {
            flex-grow: 1; /* Le conteneur prend tout l'espace restant */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            --drawing-width: min(100vw, calc((100dvh - 64px) * 16 / 9));
            --drawing-height: min(calc(100dvh - 64px), calc(100vw * 9 / 16));
        }
        .stgeorges-bg {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--drawing-width);
            height: var(--drawing-height);
            transform: translate(-50%, -50%);
            object-fit: contain;
            z-index: 15; /* Au-dessus de la vidéo */
            pointer-events: none;
        }
        #video-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--drawing-width);
            height: var(--drawing-height);
            transform: translate(-50%, -50%);
            border-radius: 0;
            overflow: hidden;
            z-index: 5; /* Derrière le dessin de fond */
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: fill;
            border-radius: 0 !important;
        }

        .selfie-btns {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30; /* Toujours au-dessus de tout */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* Suppression de .selfie-circle car non utilisé et peut causer des conflits */
        .selfie-btns button {
            font-size: 1.1rem;
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            background: #c8102e;
            color: #fff;
            cursor: pointer;
            font-family: 'MedievalSharp', Arial, serif;
            box-shadow: 0 2px 8px #0004;
        }
        .selfie-btns button:disabled {
            background: #aaa;
            color: #eee;
            cursor: not-allowed;
        }
        
        /* Styles pour les textes sur l'image */
        .selfie-text-overlay {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--drawing-width);
            height: var(--drawing-height);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20; /* Au-dessus de la vidéo */
            display: block;
            box-sizing: border-box;
        }
        
        .selfie-text-bottom {
            position: absolute;
            left: 50%;
            bottom: 3.2%;
            transform: translateX(-50%);
            text-align: center;
            color: #4b2e05;
            font-family: 'MedievalSharp', Arial, serif;
            font-size: clamp(0.9rem, 2.1vw, 1.15rem);
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.85), 0 0 3px rgba(255,255,255,0.65);
            background: transparent;
            padding: 0;
            border: none;
            box-shadow: none;
            min-width: 0;
            max-width: 34%;
            white-space: nowrap;
        }
        
        .countdown-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            font-family: 'MedievalSharp', Arial, serif;
            font-size: 6rem;
            font-weight: bold;
            color: #b30000;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            background: rgba(255,255,255,0.9);
            padding: 20px 40px;
            border-radius: 20px;
            border: 4px solid #b30000;
            display: none;
        }
        
        .popup-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-family: 'MedievalSharp', Arial, serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 3px solid #b30000;
            animation: popupFade 3s ease-in-out;
        }
        
        @keyframes popupFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
        

    </style>
</head>
<body>
<header class="main-header">
    <div class="header-content">
        <img src="images/icone titre0.png" alt="Icone 0" class="header-img left">
        <h1 data-translate="title_chevauchee">CityLoop Quest Lille</h1>
        <img src="images/icone titre1.png" alt="Icone 1" class="header-img right">
    </div>
</header>
    <div class="selfie-container">
        <div id="video-wrapper">
            <video id="video" autoplay playsinline muted style="display:block;"></video>
        </div>
        <img id="selfie-bg" src="images/fond.png" class="stgeorges-bg" alt="Fond selfie">
        
        <!-- Ajout de l'overlay de texte -->
        <div class="selfie-text-overlay">
            <div class="selfie-text-bottom" id="selfie-text-bottom">Parcours court</div>
        </div>
        

        
        <div class="selfie-btns" id="selfie-btns">
            <button id="backBtn" data-translate="back_button" style="position:fixed; right:-8px; top:50%; transform:translateY(-50%); z-index:40; font-size:1rem; padding:8px 4px; border-radius:12px; background:#c8102e; color:#fff; border:none; box-shadow:0 2px 6px #0003; opacity:0.8; writing-mode:vertical-rl; text-orientation:mixed; letter-spacing:0.15em; line-height:1.1; min-width:24px; min-height:80px;">R E T O U R</button>
        </div>
    </div>

<script>
// Script simplifié pour la caméra selfie
let video = document.getElementById('video');
let stream = null;

function startCamera() {
    const constraints = {
        video: {
            facingMode: 'user', // Caméra frontale
            width: { ideal: 1280, min: 640 },
            height: { ideal: 720, min: 480 }
        },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(mediaStream) {
            stream = mediaStream;
            video.srcObject = mediaStream;
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            video.style.display = 'block';
            
            
            // S'assurer que la vidéo se charge
            video.onloadedmetadata = function() {
                video.play().catch(function(err) {
                });
                
                // Calculer et appliquer le dézoom maximal tout en gardant l'image centrée
                applyMaxZoomOut();
                
                // Afficher le popup après que la caméra soit acceptée et la vidéo chargée
                setTimeout(showCapturePopup, 1000);
            };
            
            video.onerror = function(err) {
            };
        })
        .catch(function(err) {
            // Essayer avec des contraintes plus simples
            const simpleConstraints = {
                video: true,
                audio: false
            };
            
            navigator.mediaDevices.getUserMedia(simpleConstraints)
                .then(function(mediaStream) {
                    stream = mediaStream;
                    video.srcObject = mediaStream;
                    video.autoplay = true;
                    video.playsInline = true;
                    video.muted = true;
                    video.style.display = 'block';
                    
                    // Calculer et appliquer le dézoom maximal tout en gardant l'image centrée
                    if (video.readyState >= 1) {
                        applyMaxZoomOut();
                    } else {
                        video.onloadedmetadata = function() {
                            applyMaxZoomOut();
                        };
                    }
                    
                    // Afficher le popup même avec les contraintes simples
                    setTimeout(showCapturePopup, 1000);
                })
                .catch(function(err2) {
                });
        });
}

function showCapturePopup() {
    // Créer le popup
    const popup = document.createElement('div');
    popup.className = 'popup-message';
    popup.innerHTML = '<span data-translate="capture_popup_message">A vous de prendre la capture d\'écran !! Attendre la disparition de ce popup...</span>';
    document.body.appendChild(popup);
    
    // Appliquer les traductions au popup
    if (window.translationManager && typeof window.translationManager.applyTranslations === 'function') {
        window.translationManager.applyTranslations();
    }
    
    // Supprimer le popup après 5 secondes
    setTimeout(() => {
        if (popup.parentNode) {
            document.body.removeChild(popup);
        }
    }, 5000);
}

function applyMaxZoomOut() {
    const videoWrapper = document.getElementById('video-wrapper');
    const video = document.getElementById('video');
    if (!videoWrapper || !video) return;

    if (video.videoWidth === 0 || video.videoHeight === 0) {
        setTimeout(applyMaxZoomOut, 100);
        return;
    }

    video.style.width = '100%';
    video.style.height = '100%';
    video.style.objectFit = 'fill'; // Utiliser fill car on contrôle déjà les dimensions
    video.style.position = 'absolute';
    video.style.left = '0';
    video.style.top = '0';
    video.style.transform = 'none';
    video.style.borderRadius = '0';
}

function applySelfieBackgroundImage() {
    const bg = document.getElementById('selfie-bg');
    if (!bg) return;
    const candidates = [
        window.CLQ_CITY?.selfieBackgroundImage,
        bg.getAttribute('src'),
        'images/fond.png',
        'images/selfie-background.svg',
    ].filter(Boolean);
    const unique = [...new Set(candidates)];
    let index = 0;
    const tryNext = () => {
        if (index >= unique.length) return;
        const src = unique[index++];
        const probe = new Image();
        probe.onload = () => { bg.src = src; };
        probe.onerror = tryNext;
        probe.src = src;
    };
    tryNext();
}

function updateCircuitText() {
    const selectedCircuit = localStorage.getItem('selectedCircuit');
    const selfieTextBottom = document.getElementById('selfie-text-bottom');
    if (!selfieTextBottom) return;

    const selectedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
    const labels = {
        fr: { petit: 'Parcours court', moyen: 'Parcours moyen', grand: 'Grand parcours' },
        en: { petit: 'Short tour', moyen: 'Medium tour', grand: 'Long tour' },
        nl: { petit: 'Korte route', moyen: 'Middelgrote route', grand: 'Lange route' },
        de: { petit: 'Kurze Tour', moyen: 'Mittlere Tour', grand: 'Lange Tour' },
        it: { petit: 'Percorso breve', moyen: 'Percorso medio', grand: 'Percorso lungo' },
        es: { petit: 'Recorrido corto', moyen: 'Recorrido medio', grand: 'Recorrido largo' },
        pl: { petit: 'Krótka trasa', moyen: 'Średnia trasa', grand: 'Długa trasa' },
        ar: { petit: 'مسار قصير', moyen: 'مسار متوسط', grand: 'مسار طويل' },
        cn: { petit: '短路线', moyen: '中路线', grand: '长路线' },
        jp: { petit: '短いコース', moyen: '中コース', grand: '長いコース' }
    };
    const langLabels = labels[selectedLanguage] || labels.fr;
    selfieTextBottom.textContent = langLabels[selectedCircuit] || langLabels.petit;
}

function goBack() {
    window.history.back();
}

// Initialiser au chargement
document.addEventListener('DOMContentLoaded', function() {
    applySelfieBackgroundImage();
    // Démarrer la caméra
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        startCamera();
    }
    
    // Créer le sélecteur de langue
    if (window.languageSelector) {
        window.languageSelector.createSelector();
    }
    
    // Appliquer les traductions
    if (window.translationManager) {
        window.translationManager.init().then(() => {
            // Mettre à jour le texte du circuit après que les traductions soient chargées
            updateCircuitText();
        });
    } else {
        // Mettre à jour le texte du circuit même si le gestionnaire n'est pas disponible
        updateCircuitText();
    }
    
    // �0vénement du bouton retour
    document.getElementById('backBtn').addEventListener('click', goBack);
    
    // �0couter les changements de langue
    document.addEventListener('languageChanged', function(event) {
        updateCircuitText();
        if (window.translationManager && typeof window.translationManager.applyTranslations === 'function') {
            window.translationManager.applyTranslations();
        }
    });
});
</script>
</body>
</html>
